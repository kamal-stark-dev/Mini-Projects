<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokemon Flipbook</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <div class="heading">
        <img src="./assets/site-heading.png" alt="Some Original Pokémons" />
      </div>
      <!-- flipbook -->
      <div class="flipbook">
        <!-- front cover -->
        <div class="page hard">
          <h1>My Pokémon Gallery</h1>
          <small>~ Kamal Stark</small>
        </div>
        <div class="page hard"></div>

        <!-- pages -->
        <div class="page">
          <strong>Let's look at some amazing Pokémons.</strong>
          <small>Gotta Catch 'Em All.</small>
        </div>

        <!-- example on how to add pages
        <div class="page">
            <img src="./pokemons/pikachu.png" alt="pikachu" />
            <small>Pikachu</small>
        </div>
        <div class="page">
            <img src="./pokemons/bulbasaur.png" alt="bulbasaur" />
            <small>Bulbasaur</small>
        </div>
        <div class="page">
            <img src="./pokemons/squirtle.png" alt="squirtle" />
            <small>Squirtle</small>
        </div>
        <div class="page">
            <img src="./pokemons/charmander.png" alt="charmander" />
            <small>Charmander</small>
        </div>
        <div class="page"></div>
        -->

        <!-- Pages and ending covers are added dynamically through `script.js` -->
      </div>
    </main>

    <!-- using turn.js library which depends on jquery -->
    <script src="./jquery.js"></script>
    <script src="./turn.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
